version: '3.8'

services:
  db:
    image: postgres:15-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  web:
    build: .
    command: gunicorn bankingportal.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=bankingportal.settings.production
      - RUN_MIGRATIONS=true
    depends_on:
      - db
      - redis

  celery_worker:
    build: .
    command: celery -A bankingportal worker --loglevel=info --concurrency=${CELERY_CONCURRENCY}
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=bankingportal.settings.production
    depends_on:
      - db
      - redis

  celery_beat:
    build: .
    command: celery -A bankingportal beat --loglevel=info
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=bankingportal.settings.production
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  redis_data:
